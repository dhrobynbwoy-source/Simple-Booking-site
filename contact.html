<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" role="img" aria-labelledby="receiptTitle">
  <title id="receiptTitle">Aperçu d'une confirmation de réservation Simple Booking</title>
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#14241F" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- carte de fond légèrement pivotée -->
  <g transform="rotate(-3 210 260)">
    <rect x="30" y="20" width="330" height="470" rx="4" fill="#E9E2D2"/>
  </g>

  <!-- carte principale : reçu -->
  <g filter="url(#cardShadow)">
    <path d="M40 30 H380 V470 L365 484 L350 470 L335 484 L320 470 L305 484 L290 470 L275 484 L260 470 L245 484 L230 470 L215 484 L200 470 L185 484 L170 470 L155 484 L140 470 L125 484 L110 470 L95 484 L80 470 L65 484 L40 470 Z" fill="#FFFFFF"/>

    <!-- bandeau haut -->
    <rect x="40" y="30" width="340" height="64" rx="0" fill="#1B3A34"/>
    <circle cx="66" cy="62" r="14" fill="#E3A73A"/>
    <path d="M59 62l5 5 9-10" fill="none" stroke="#1B3A34" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="58" font-family="'IBM Plex Mono', monospace" font-size="11" letter-spacing="1.5" fill="#E9E2D2">RÉSERVATION</text>
    <text x="90" y="76" font-family="'Fraunces', serif" font-size="17" fill="#FFFFFF">Confirmée</text>

    <!-- pointillés -->
    <line x1="60" y1="112" x2="360" y2="112" stroke="#E4DFD3" stroke-width="2" stroke-dasharray="4 6"/>

    <!-- ligne info : client -->
    <text x="60" y="140" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="1.2" fill="#8A8677">CLIENTE</text>
    <text x="60" y="162" font-family="'Inter', sans-serif" font-size="17" font-weight="600" fill="#14241F">Awa Kouassi</text>

    <!-- ligne info : service -->
    <text x="60" y="196" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="1.2" fill="#8A8677">PRESTATION</text>
    <text x="60" y="218" font-family="'Inter', sans-serif" font-size="17" font-weight="600" fill="#14241F">Coiffure &amp; soin</text>

    <!-- date / heure -->
    <text x="60" y="252" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="1.2" fill="#8A8677">DATE</text>
    <text x="60" y="274" font-family="'Inter', sans-serif" font-size="17" font-weight="600" fill="#14241F">Jeudi 23 juillet</text>

    <text x="230" y="252" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="1.2" fill="#8A8677">HEURE</text>
    <text x="230" y="274" font-family="'Inter', sans-serif" font-size="17" font-weight="600" fill="#14241F">16h00</text>

    <line x1="60" y1="298" x2="360" y2="298" stroke="#E4DFD3" stroke-width="2" stroke-dasharray="4 6"/>

    <!-- lien de réservation -->
    <text x="60" y="326" font-family="'IBM Plex Mono', monospace" font-size="10" letter-spacing="1.2" fill="#8A8677">VOTRE LIEN</text>
    <rect x="60" y="336" width="260" height="30" rx="15" fill="#FAF8F4"/>
    <text x="78" y="356" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#1B3A34">simplebooking.app/awa</text>

    <!-- badge notification -->
    <rect x="60" y="392" width="260" height="46" rx="10" fill="#FFF6E6"/>
    <circle cx="82" cy="415" r="9" fill="#E3A73A"/>
    <text x="99" y="411" font-family="'Inter', sans-serif" font-size="11.5" font-weight="600" fill="#14241F">Notification envoyée</text>
    <text x="99" y="426" font-family="'Inter', sans-serif" font-size="11" fill="#5C5A50">Ajoutée à Google Calendar</text>
  </g>
</svg>
